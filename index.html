<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172033">
  <meta name="description" content="可安裝的數學幾何與函數圖形教材 App">
  <title>數學幾何教材 App</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --surface: #eef2f7;
      --brand: #4f46e5;
      --brand-ink: #eef2ff;
      --accent: #dc2626;
      --ok: #047857;
      --shadow: 0 18px 45px rgba(15, 23, 42, .09);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--surface);
      color: var(--ink);
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 18px clamp(16px, 3vw, 32px);
      background: var(--ink);
      color: white;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--brand);
      box-shadow: 0 10px 25px rgba(79,70,229,.35);
      font-weight: 800;
    }
    .brand h1 { margin: 0; font-size: clamp(18px, 2vw, 24px); line-height: 1.15; }
    .brand p { margin: 3px 0 0; color: #b7c2d6; font-size: 13px; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 13px;
      color: var(--ink);
      background: white;
      font-weight: 750;
      font-size: 13px;
      min-height: 40px;
    }
    .btn.primary { background: var(--brand); color: white; }
    .btn.dark { background: #111827; color: white; border-color: rgba(255,255,255,.14); }
    .btn.ghost { background: rgba(255,255,255,.08); color: white; border-color: rgba(255,255,255,.12); }
    .btn.soft { background: #eef2ff; color: #3730a3; border-color: #d8ddff; }
    .btn.danger { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    main {
      width: min(1540px, 100%);
      margin: 0 auto;
      padding: clamp(14px, 2vw, 28px);
      display: grid;
      grid-template-columns: minmax(300px, 430px) 1fr;
      gap: 20px;
      align-items: start;
      flex: 1;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .sidebar { padding: 20px; display: grid; gap: 18px; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid #edf0f5;
    }
    .section-title h2, .workspace-title h2 { margin: 0; font-size: 18px; }
    .field { display: grid; gap: 8px; }
    label { font-size: 13px; font-weight: 800; color: #344054; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.13); background: white; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid #d8ddff;
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .style-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .style-card {
      border: 2px solid var(--line);
      background: #fbfcff;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 5px;
      text-align: left;
    }
    .style-card[aria-pressed="true"] { border-color: var(--brand); background: #eef2ff; }
    .style-card strong { font-size: 13px; }
    .style-card span { font-size: 11px; color: var(--muted); }

    .workspace { display: grid; gap: 14px; }
    .tabs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
    }
    .tab-list, .toolbar, .export-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tab {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #f1f5f9;
      color: #475467;
      font-weight: 850;
      font-size: 13px;
    }
    .tab.active { background: var(--brand); color: white; }
    .workspace-card { padding: 16px; display: grid; gap: 14px; }
    .toolbar {
      justify-content: space-between;
      background: #f8fafc;
      border: 1px solid #edf0f5;
      border-radius: 12px;
      padding: 10px;
    }
    .toolbar small { color: var(--muted); font-weight: 800; }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.6; }

    .canvas-box {
      position: relative;
      min-height: 520px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: white;
      touch-action: none;
      user-select: none;
    }
    #graphic, #drawLayer, #labelLayer { position: absolute; inset: 0; width: 100%; height: 100%; }
    #graphic { display: grid; place-items: center; padding: 18px; }
    #drawLayer { z-index: 4; }
    #labelLayer { z-index: 5; pointer-events: none; }
    .label-pill {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: min(330px, 46vw);
      padding: 7px 10px;
      border-radius: 9px;
      border: 1px solid #334155;
      background: rgba(15,23,42,.94);
      color: white;
      font-size: 12px;
      font-weight: 800;
      cursor: grab;
      pointer-events: auto;
      box-shadow: 0 12px 28px rgba(15,23,42,.18);
    }
    .label-pill.light { background: rgba(255,255,255,.96); color: #172033; border-color: #cbd5e1; }
    .label-pill.indigo { background: rgba(49,46,129,.96); color: #eef2ff; border-color: #818cf8; }
    .label-pill:active { cursor: grabbing; }
    .math {
      font-family: "Times New Roman", "Cambria Math", serif;
      font-style: italic;
      letter-spacing: .01em;
      white-space: nowrap;
    }
    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      vertical-align: middle;
      line-height: 1;
      font-size: .86em;
      margin: 0 .08em;
      text-align: center;
    }
    .frac span:first-child {
      border-bottom: 1px solid currentColor;
      padding: 0 .18em .08em;
    }
    .frac span:last-child { padding-top: .08em; }
    .badge {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--brand);
      color: white;
      font-size: 10px;
      flex: 0 0 auto;
    }
    .content-page { padding: 24px; }
    .workspace-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid #edf0f5;
    }
    .pill { border-radius: 999px; background: #eef2ff; color: #3730a3; padding: 7px 10px; font-size: 12px; font-weight: 850; }
    .lesson-grid { display: grid; gap: 15px; margin-top: 18px; }
    .lesson-grid h3 { margin: 0; font-size: 16px; }
    .lesson-grid p, .lesson-grid li { color: #475467; line-height: 1.75; font-size: 14px; }
    .box {
      border: 1px solid #e6eaf2;
      border-radius: 12px;
      background: #f8fafc;
      padding: 14px;
    }
    .qa { display: grid; gap: 12px; margin-top: 18px; }
    .question { border: 1px solid #e6eaf2; border-radius: 12px; background: #fbfcff; padding: 14px; }
    .question h3 { margin: 0 0 8px; font-size: 15px; }
    .options { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-top: 10px; }
    .option { border: 1px solid #dbe2ed; background: white; border-radius: 9px; padding: 9px; font-size: 13px; }
    .answer-space { margin-top: 10px; min-height: 96px; border: 1px dashed #b7c2d6; border-radius: 10px; background: white; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      background: #111827;
      color: white;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: .2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .hidden { display: none !important; }
    footer { text-align: center; color: #667085; font-size: 12px; padding: 22px; }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .canvas-box { min-height: 440px; }
    }
    @media (max-width: 640px) {
      .topbar { display: grid; }
      .style-grid, .options { grid-template-columns: 1fr; }
      .tab, .btn { width: 100%; justify-content: center; }
      .tab-list, .export-actions, .toolbar, .top-actions { width: 100%; }
      .canvas-box { min-height: 380px; }
      .label-pill { max-width: 78vw; }
    }
    @media print {
      .topbar, .sidebar, .tabs, .toolbar, footer, .toast { display: none !important; }
      main { display: block; padding: 0; }
      .panel { box-shadow: none; border: 0; }
      .canvas-box { page-break-after: always; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">∑</div>
        <div>
          <h1>數學幾何與函數圖形教材 App</h1>
          <p>互動畫布、教案解析、隨堂測驗與可安裝 PWA</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn ghost" id="installBtn" hidden>安裝 App</button>
        <button class="btn dark" id="printBtn">列印教材</button>
      </div>
    </header>

    <main>
      <aside class="panel sidebar" aria-label="教材生成設定">
        <div class="section-title">
          <h2>教材生成設定</h2>
          <span class="pill" id="modePill">展示模式</span>
        </div>

        <div class="field">
          <label for="subject">數學單元 / 幾何概念</label>
          <input id="subject" placeholder="例如：畢氏定理、三角函數、拋物線" value="畢氏定理">
          <div class="chips" aria-label="快速選取">
            <button class="chip" data-preset="pythagoras">畢氏定理</button>
            <button class="chip" data-preset="circle">三角函數單位圓</button>
            <button class="chip" data-preset="parabola">拋物線圖形</button>
            <button class="chip" data-preset="normal">常態分配</button>
          </div>
        </div>

        <div class="field">
          <label>幾何圖形風格</label>
          <div class="style-grid">
            <button class="style-card" data-style="line" aria-pressed="true"><strong>黑白線稿</strong><span>適合印刷與考卷</span></button>
            <button class="style-card" data-style="color" aria-pressed="false"><strong>彩色插圖</strong><span>對比清楚，適合投影</span></button>
            <button class="style-card" data-style="grid" aria-pressed="false"><strong>坐標格線</strong><span>刻度與定位明確</span></button>
            <button class="style-card" data-style="board" aria-pressed="false"><strong>黑板粉筆</strong><span>課堂板書氛圍</span></button>
          </div>
        </div>

        <div class="field">
          <label for="audience">適合對象 / 學層</label>
          <select id="audience">
            <option>國民小學</option>
            <option selected>國民中學</option>
            <option>高級中學</option>
          </select>
        </div>

        <div class="field">
          <label for="notes">補充說明與教學重點</label>
          <textarea id="notes" placeholder="例如：請標出 a² + b² = c² 的面積關係，並使用 3-4-5 直角三角形。"></textarea>
        </div>

        <div class="field">
          <label for="templateName">自訂範本</label>
          <input id="templateName" placeholder="輸入範本名稱，例如：我的單位圓講義">
          <div class="export-actions">
            <button class="btn soft" id="saveTemplateBtn">儲存目前範本</button>
            <button class="btn danger" id="deleteTemplateBtn">刪除範本</button>
          </div>
          <select id="customTemplateSelect" aria-label="已儲存的自訂範本">
            <option value="">尚未選擇自訂範本</option>
          </select>
          <button class="btn" id="loadTemplateBtn">載入選取範本</button>
          <p class="hint">範本會保存目前底圖類型、風格、標籤位置、箭頭、點、線段、圓與底圖文字開關。</p>
        </div>

        <button class="btn primary" id="generateBtn">生成教材</button>
      </aside>

      <section class="workspace" aria-label="教材工作區">
        <div class="panel tabs">
          <div class="tab-list" role="tablist" aria-label="工作區分頁">
            <button class="tab active" data-tab="canvas" role="tab">1. 互動畫布</button>
            <button class="tab" data-tab="lesson" role="tab">2. 教案解析</button>
            <button class="tab" data-tab="worksheet" role="tab">3. 隨堂測驗</button>
          </div>
          <div class="export-actions">
            <button class="btn soft" id="exportPngBtn">匯出 PNG</button>
            <button class="btn soft" id="exportSvgBtn">匯出 SVG</button>
            <button class="btn soft" id="copyStateBtn">複製教材 JSON</button>
          </div>
        </div>

        <section class="panel workspace-card" id="pageCanvas">
          <div class="toolbar">
            <div class="toolbar">
              <small>繪圖工具</small>
              <button class="btn soft" data-tool="select">選取/搬移</button>
              <button class="btn" data-tool="point">新增點</button>
              <button class="btn" data-tool="segment">線段</button>
              <button class="btn" data-tool="circle">圓</button>
              <button class="btn" data-tool="arrow">標示箭頭</button>
              <button class="btn" id="addLabelBtn">新增標籤</button>
              <button class="btn danger" id="clearBtn">清除手繪物件</button>
            </div>
            <button class="btn" id="themeBtn">標籤配色：深藍</button>
            <button class="btn" id="diagramTextBtn">底圖文字：關</button>
          </div>
          <p class="hint">提示：在「選取/搬移」模式可拖曳點、線段端點、圓心與圓周控制點；也可拖曳標籤，雙擊標籤修改文字。SVG 適合交給講義、論文、簡報與向量編輯軟體。</p>
          <div class="canvas-box" id="canvasBox">
            <div id="graphic"></div>
            <canvas id="drawLayer"></canvas>
            <div id="labelLayer"></div>
          </div>
        </section>

        <section class="panel content-page hidden" id="pageLesson">
          <div class="workspace-title">
            <h2>幾何概念解析教案</h2>
            <span class="pill" id="audiencePill">國民中學</span>
          </div>
          <div class="lesson-grid" id="lessonContent"></div>
        </section>

        <section class="panel content-page hidden" id="pageWorksheet">
          <div class="workspace-title">
            <h2>隨堂測驗單</h2>
            <span class="pill">堂前測驗 / 觀念檢證</span>
          </div>
          <div class="qa" id="worksheetContent"></div>
        </section>
      </section>
    </main>

    <footer>© 2026 數學學科教學研發中心。此版本已封裝為可安裝的 PWA App。</footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const app = {
      preset: "pythagoras",
      style: "line",
      tool: "select",
      labelTheme: "dark",
      labels: [],
      arrows: [],
      objects: [],
      dragLabel: null,
      drawing: null,
      installPrompt: null,
      showDiagramText: false,
      activeHandle: null,
      pendingObject: null,
      customTemplates: {}
    };

    const TEMPLATE_STORAGE_KEY = "math_geometry_custom_templates_v1";

    const presets = {
      pythagoras: {
        title: "畢氏定理",
        subtitle: "直角三角形三邊平方關係",
        labels: [
          ["直角邊 $a=3$", 28, 56], ["直角邊 $b=4$", 48, 69], ["斜邊 $c=5$", 56, 45],
          ["$a^2=9$", 13, 47], ["$b^2=16$", 42, 86], ["$c^2=25$", 68, 27]
        ],
        arrows: [[30,58,34,58],[48,78,48,70],[66,30,57,41]],
        objective: "能由直角三角形三邊所作正方形的面積關係，說明並使用 $a^2+b^2=c^2$。",
        principle: "在直角三角形 $\\triangle ABC$ 中，若 $\\angle C=90^\\circ$，兩直角邊為 $a,b$，斜邊為 $c$，則 $a^2+b^2=c^2$。課本圖像通常以三邊向外作正方形表示：直角邊正方形面積和等於斜邊正方形面積。",
        steps: ["辨認斜邊必為直角對邊，並確認 $c$ 是最大邊。", "以 $3$、$4$、$5$ 直角三角形檢查 $3^2+4^2=5^2$。", "把邊長平方解讀為正方形面積，連結代數式與幾何圖形。"],
        misconception: "不能把畢氏定理套用到任意三角形；若不是直角三角形，需改用餘弦定理。",
        questions: [
          ["填空", "直角三角形兩直角邊為 $5$ 與 $12$，斜邊 $c=\\sqrt{5^2+12^2}=$ ______。"],
          ["選擇", "坐標平面上 $P(3,-4)$ 到原點 $O(0,0)$ 的距離為？", ["3", "4", "5", "7"]],
          ["問答", "請以「三邊向外作正方形」的面積關係，說明 $a^2+b^2=c^2$ 的意義。"]
        ]
      },
      circle: {
        title: "三角函數與單位圓",
        subtitle: "任意角三角函數的坐標定義",
        labels: [
          ["單位圓 $x^2+y^2=1$", 14, 15], ["$P(\\cos\\theta,\\sin\\theta)$", 62, 23],
          ["$\\cos\\theta$: 橫坐標", 40, 64], ["$\\sin\\theta$: 縱坐標", 68, 41],
          ["$\\theta=30^\\circ$", 54, 50], ["$\\tan\\theta=\\frac{\\sin\\theta}{\\cos\\theta}$", 55, 83]
        ],
        arrows: [[23,18,35,26],[63,27,59,33],[47,64,51,58],[68,43,61,42]],
        objective: "能以單位圓上的點 $P(\\cos\\theta,\\sin\\theta)$ 定義任意角的正弦與餘弦。",
        principle: "半徑為 $1$ 的圓稱為單位圓，標準方程式為 $x^2+y^2=1$。角 $\\theta$ 的終邊與單位圓交於 $P(x,y)$ 時，定義 $x=\\cos\\theta$、$y=\\sin\\theta$，因此 $\\sin^2\\theta+\\cos^2\\theta=1$。",
        steps: ["先標出原點 $O$、坐標軸與半徑 $OP=1$。", "將 $P$ 垂直投影到 $x$ 軸，讀出 $\\cos\\theta$ 與 $\\sin\\theta$。", "利用圓方程式推導平方關係。"],
        misconception: "$\\sin\\theta$ 與 $\\cos\\theta$ 是坐標值，不是線段名稱；它們的取值範圍皆為 $[-1,1]$。",
        questions: [
          ["填空", "若 $\\theta$ 在第三象限，則 $\\sin\\theta$ 為 ______，$\\cos\\theta$ 為 ______。"],
          ["選擇", "若 $\\sin\\theta=\\frac{3}{5}$ 且 $\\theta$ 在第二象限，$\\cos\\theta$ 為？", ["$\\frac{4}{5}$", "$-\\frac{4}{5}$", "$\\frac{3}{4}$", "$-\\frac{3}{4}$"]],
          ["問答", "請由 $x^2+y^2=1$ 說明 $\\sin^2\\theta+\\cos^2\\theta=1$。"]
        ]
      },
      parabola: {
        title: "二次函數與拋物線",
        subtitle: "頂點式、對稱軸與截距",
        labels: [
          ["函數 $y=(x-1)^2-4$", 61, 18], ["頂點 $V(1,-4)$", 47, 78],
          ["對稱軸 $x=1$", 17, 32], ["$x$ 截距 $(-1,0),(3,0)$", 17, 68],

    const qs = (s, root = document) => root.querySelector(s);
    const qsa = (s, root = document) => [...root.querySelectorAll(s)];
    const canvas = qs("#drawLayer");
    const ctx = canvas.getContext("2d");

    function toast(message) {
      const el = qs("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove("show"), 2600);
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function mathText(text) {
      return escapeHTML(text)
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "<span class=\"frac\"><span>$1</span><span>$2</span></span>")
        .replace(/\\sqrt\{([^{}]+)\}/g, "√($1)")
        .replace(/\\theta/g, "θ")
        .replace(/\\mu/g, "μ")
        .replace(/\\sigma/g, "σ")
        .replace(/\\triangle/g, "△")
        .replace(/\\angle/g, "∠")
        .replace(/\\cos/g, "cos")
        .replace(/\\sin/g, "sin")
        .replace(/\\tan/g, "tan")
        .replace(/\\pm/g, "±")
        .replace(/\\%/g, "%")
        .replace(/\\circ/g, "°")
        .replace(/\^2/g, "<sup>2</sup>")
        .replace(/\^3/g, "<sup>3</sup>")
        .replace(/\$(.*?)\$/g, "<span class=\"math\">$1</span>");
    }

    function plainMath(text) {
      return String(text)
        .replace(/\$/g, "")
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "$1/$2")
        .replace(/\\sqrt\{([^{}]+)\}/g, "√($1)")
        .replace(/\\theta/g, "θ")
        .replace(/\\mu/g, "μ")
        .replace(/\\sigma/g, "σ")
        .replace(/\\triangle/g, "△")
        .replace(/\\angle/g, "∠")
        .replace(/\\cos/g, "cos")
        .replace(/\\sin/g, "sin")
        .replace(/\\tan/g, "tan")
        .replace(/\\pm/g, "±")
        .replace(/\\%/g, "%")
        .replace(/\\circ/g, "°")
        .replace(/\^2/g, "²")
        .replace(/\^3/g, "³");
    }

    function setPreset(key) {
      const data = presets[key];
      app.preset = key;
      qs("#subject").value = data.title;
      app.labels = data.labels.map((item, index) => ({ id: index + 1, text: item[0], px: item[1], py: item[2] }));
      app.arrows = data.arrows.map(([fromX, fromY, toX, toY]) => ({ fromX, fromY, toX, toY }));
      app.objects = [];
      app.pendingObject = null;
      renderGraphic(key);
      renderLabels();
      drawArrows();
      renderLesson();
      renderWorksheet();
      toast(`已載入「${data.title}」教材模板`);
    }

    function getCurrentTemplateState(name) {
      return {
        name,
        preset: app.preset,
        style: app.style,
        labelTheme: app.labelTheme,
        showDiagramText: app.showDiagramText,
        audience: qs("#audience").value,
        notes: qs("#notes").value,
        labels: structuredClone(app.labels),
        arrows: structuredClone(app.arrows),
        objects: structuredClone(app.objects)

    function applyTemplateState(template) {
      if (!template || !presets[template.preset]) return;
      app.preset = template.preset;
      app.style = template.style || "line";
      app.labelTheme = template.labelTheme || "dark";
      app.showDiagramText = !!template.showDiagramText;
      app.labels = structuredClone(template.labels || []);
      app.arrows = structuredClone(template.arrows || []);
      app.objects = structuredClone(template.objects || []);
      app.pendingObject = null;
      app.activeHandle = null;
      qs("#subject").value = presets[app.preset].title;

      qsa("[data-style]").forEach(item => item.setAttribute("aria-pressed", item.dataset.style === app.style ? "true" : "false"));

      renderLabels();

    function loadCustomTemplates() {
      try {
        app.customTemplates = JSON.parse(localStorage.getItem(TEMPLATE_STORAGE_KEY) || "{}");
      } catch {
        app.customTemplates = {};
      }
      renderCustomTemplateSelect();
    }

    function persistCustomTemplates() {
      localStorage.setItem(TEMPLATE_STORAGE_KEY, JSON.stringify(app.customTemplates));
      renderCustomTemplateSelect();
    }

    function renderCustomTemplateSelect() {
      const select = qs("#customTemplateSelect");
      const selected = select.value;
      const names = Object.keys(app.customTemplates).sort((a, b) => a.localeCompare(b, "zh-Hant"));
      select.innerHTML = `<option value="">${names.length ? "請選擇自訂範本" : "尚未儲存自訂範本"}</option>` + names.map(name => `<option value="${escapeHTML(name)}">${escapeHTML(name)}</option>`).join("");
      if (app.customTemplates[selected]) select.value = selected;
    }

    function saveCurrentTemplate() {
      const name = qs("#templateName").value.trim() || prompt("請輸入範本名稱：", presets[app.preset].title);
      if (!name) return;
      app.customTemplates[name] = getCurrentTemplateState(name);
      persistCustomTemplates();
      qs("#templateName").value = name;
      qs("#customTemplateSelect").value = name;
      toast(`已儲存自訂範本「${name}」`);
    }

    function loadSelectedTemplate() {
      const name = qs("#customTemplateSelect").value;
      if (!name || !app.customTemplates[name]) {
        toast("請先選擇要載入的自訂範本");
        return;
      }
      applyTemplateState(app.customTemplates[name]);
      qs("#templateName").value = name;
      toast(`已載入自訂範本「${name}」`);
    }

    function deleteSelectedTemplate() {
      const name = qs("#customTemplateSelect").value;
      if (!name || !app.customTemplates[name]) {

        return;
      }
      delete app.customTemplates[name];

    function resizeCanvas() {
      const box = qs("#canvasBox");
      const rect = box.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      drawArrows();
    }

    function drawArrow(a, color = "#dc2626") {
      const box = qs("#canvasBox").getBoundingClientRect();
      const fromX = a.fromX * box.width / 100;
      const fromY = a.fromY * box.height / 100;
      const toX = a.toX * box.width / 100;
      const toY = a.toY * box.height / 100;
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3.2;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - 14 * Math.cos(angle - Math.PI / 6), toY - 14 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - 14 * Math.cos(angle + Math.PI / 6), toY - 14 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawEditableObject(object) {
      const box = qs("#canvasBox").getBoundingClientRect();
      ctx.save();
      ctx.lineWidth = 2.4;
      ctx.strokeStyle = object.color || "#111827";
      ctx.fillStyle = object.color || "#111827";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      if (object.type === "point") {
        const p = pctToPoint(object.x, object.y, box.width, box.height);
        drawPointMarker(ctx, p.x, p.y, object.name || "");
      }
      if (object.type === "segment") {
        const a = pctToPoint(object.x1, object.y1, box.width, box.height);
        const b = pctToPoint(object.x2, object.y2, box.width, box.height);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        drawHandle(ctx, a.x, a.y);
        drawHandle(ctx, b.x, b.y);
      }
      if (object.type === "circle") {
        const c = pctToPoint(object.cx, object.cy, box.width, box.height);
        const edge = pctToPoint(object.rx, object.ry, box.width, box.height);
        const r = Math.hypot(edge.x - c.x, edge.y - c.y);
        ctx.beginPath();
        ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
        ctx.stroke();
        drawHandle(ctx, c.x, c.y);
        drawHandle(ctx, edge.x, edge.y);
      }
      ctx.restore();
    }

    function drawPointMarker(target, x, y, name = "") {
      target.save();
      target.beginPath();
      target.arc(x, y, 5.5, 0, Math.PI * 2);
      target.fill();
      target.strokeStyle = "#ffffff";
      target.lineWidth = 2;
      target.stroke();
      if (name) {
        target.font = "700 14px Times New Roman, serif";
        target.fillText(name, x + 9, y - 9);
      }
      target.restore();
    }

    function drawHandle(target, x, y) {
      target.save();
      target.fillStyle = "#ffffff";
      target.strokeStyle = "#111827";
      target.lineWidth = 2;
      target.beginPath();
      target.arc(x, y, 5, 0, Math.PI * 2);
      target.fill();
      target.stroke();
      target.restore();
    }

    function drawArrows(preview) {
      const rect = qs("#canvasBox").getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      app.objects.forEach(drawEditableObject);
      app.arrows.forEach(a => drawArrow(a, app.labelTheme === "indigo" ? "#6366f1" : "#dc2626"));
      if (preview) drawArrow(preview, "#f87171");
      if (app.pendingObject) drawPendingObject(app.pendingObject);
    }

    function drawPendingObject(pending) {
      if (!pending.preview) return;
      ctx.save();
      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2.2;
      const box = qs("#canvasBox").getBoundingClientRect();
      const a = pctToPoint(pending.x, pending.y, box.width, box.height);
      const b = pctToPoint(pending.preview.x, pending.preview.y, box.width, box.height);
      if (pending.type === "segment") {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      if (pending.type === "circle") {
        ctx.beginPath();
        ctx.arc(a.x, a.y, Math.hypot(b.x - a.x, b.y - a.y), 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function startLabelDrag(event, label, el) {
      if (app.tool !== "select") return;
      event.preventDefault();
      el.setPointerCapture(event.pointerId);
      const box = qs("#canvasBox").getBoundingClientRect();
      const start = { x: event.clientX, y: event.clientY, px: label.px, py: label.py };
      const move = e => {
        const dx = (e.clientX - start.x) / box.width * 100;
        const dy = (e.clientY - start.y) / box.height * 100;
        label.px = Math.max(0, Math.min(92, start.px + dx));
        label.py = Math.max(0, Math.min(92, start.py + dy));
        el.style.left = `${label.px}%`;
        el.style.top = `${label.py}%`;
      };
      const up = () => {
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
      };
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
    }

    function editLabel(id) {
      const label = app.labels.find(item => item.id === id);
      const value = prompt("修改標籤文字，清空可刪除：", label.text);
      if (value === null) return;
      if (!value.trim()) app.labels = app.labels.filter(item => item.id !== id);
      else label.text = value.trim();
      renderLabels();
    }

    function pctToPoint(px, py, width, height) {
      return { x: px * width / 100, y: py * height / 100 };
    }

    function eventToPct(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(100, (event.clientX - rect.left) / rect.width * 100)),
        y: Math.max(0, Math.min(100, (event.clientY - rect.top) / rect.height * 100))
      };
    }

    function addPointAt(x, y) {
      const name = String.fromCharCode(65 + app.objects.filter(object => object.type === "point").length);
      app.objects.push({ type: "point", x, y, name, color: "#111827" });
      drawArrows();
      toast(`已新增點 ${name}`);
    }

    function findNearestHandle(x, y) {
      const box = qs("#canvasBox").getBoundingClientRect();
      const hitRadius = 18;
      const handles = [];
      app.objects.forEach((object, objectIndex) => {
        if (object.type === "point") handles.push({ objectIndex, handle: "point", ...pctToPoint(object.x, object.y, box.width, box.height) });
        if (object.type === "segment") {
          handles.push({ objectIndex, handle: "a", ...pctToPoint(object.x1, object.y1, box.width, box.height) });
          handles.push({ objectIndex, handle: "b", ...pctToPoint(object.x2, object.y2, box.width, box.height) });
        }
        if (object.type === "circle") {
          handles.push({ objectIndex, handle: "center", ...pctToPoint(object.cx, object.cy, box.width, box.height) });
          handles.push({ objectIndex, handle: "radius", ...pctToPoint(object.rx, object.ry, box.width, box.height) });
        }
      });
      let nearest = null;
      handles.forEach(handle => {
        const distance = Math.hypot(handle.x - x, handle.y - y);
        if (distance <= hitRadius && (!nearest || distance < nearest.distance)) nearest = { ...handle, distance };
      });
      return nearest;
    }

    function updateHandle(active, pct) {
      const object = app.objects[active.objectIndex];
      if (!object) return;
      if (object.type === "point") {
        object.x = pct.x;
        object.y = pct.y;
      }
      if (object.type === "segment") {
        if (active.handle === "a") {
          object.x1 = pct.x;
          object.y1 = pct.y;
        } else {
          object.x2 = pct.x;
          object.y2 = pct.y;
        }
      }
      if (object.type === "circle") {
        if (active.handle === "center") {
          const dx = pct.x - object.cx;
          const dy = pct.y - object.cy;
          object.cx = pct.x;
          object.cy = pct.y;
          object.rx = Math.max(0, Math.min(100, object.rx + dx));
          object.ry = Math.max(0, Math.min(100, object.ry + dy));
        } else {
          object.rx = pct.x;
          object.ry = pct.y;
        }
      }
      drawArrows();
    }

    function handleCanvasDown(event) {
      const pct = eventToPct(event);
      const rect = canvas.getBoundingClientRect();
      if (app.tool === "select") {
        const nearest = findNearestHandle(event.clientX - rect.left, event.clientY - rect.top);
        if (nearest) {
          app.activeHandle = nearest;
          canvas.setPointerCapture(event.pointerId);
        }
        return;
      }
      if (app.tool === "point") {
        addPointAt(pct.x, pct.y);
        return;
      }
      if (app.tool === "segment" || app.tool === "circle") {
        app.pendingObject = { type: app.tool, x: pct.x, y: pct.y, preview: pct };
        canvas.setPointerCapture(event.pointerId);
        drawArrows();
        return;
      }
      if (app.tool === "arrow") {
        app.drawing = { fromX: pct.x, fromY: pct.y };
        canvas.setPointerCapture(event.pointerId);
      }
    }

    function handleCanvasMove(event) {
      const pct = eventToPct(event);
      if (app.activeHandle) {
        updateHandle(app.activeHandle, pct);
        return;
      }
      if (app.pendingObject) {
        app.pendingObject.preview = pct;
        drawArrows();
        return;
      }
      if (app.drawing) drawArrows({ ...app.drawing, toX: pct.x, toY: pct.y });
    }

    function handleCanvasUp(event) {
      const pct = eventToPct(event);
      if (app.activeHandle) {
        updateHandle(app.activeHandle, pct);
        app.activeHandle = null;
        return;
      }
      if (app.pendingObject) {
        const start = app.pendingObject;
        const distance = Math.hypot(pct.x - start.x, pct.y - start.y);
        if (distance > 1.5 && start.type === "segment") {
          app.objects.push({ type: "segment", x1: start.x, y1: start.y, x2: pct.x, y2: pct.y, color: "#111827" });
        }
        if (distance > 1.5 && start.type === "circle") {
          app.objects.push({ type: "circle", cx: start.x, cy: start.y, rx: pct.x, ry: pct.y, color: "#111827" });
        }
        app.pendingObject = null;
        drawArrows();
        return;
      }
      if (app.drawing) {
        const distance = Math.hypot(pct.x - app.drawing.fromX, pct.y - app.drawing.fromY);
        if (distance > 1.5) app.arrows.push({ ...app.drawing, toX: pct.x, toY: pct.y });
        app.drawing = null;
        drawArrows();
      }
    }

    function renderLesson() {
      const data = presets[app.preset];
      qs("#audiencePill").textContent = qs("#audience").value;
      qs("#lessonContent").innerHTML = `
        <section><h3>一、教學目標</h3><div class="box"><p>${mathText(data.objective)}</p></div></section>
        <section><h3>二、核心定理與原理</h3><div class="box"><p>${mathText(data.principle)}</p></div></section>
        <section><h3>三、課本式圖像閱讀流程</h3><div class="box"><ol>${data.steps.map(step => `<li>${mathText(step)}</li>`).join("")}</ol></div></section>
        <section><h3>四、常見迷思</h3><div class="box"><p>${mathText(data.misconception)}</p></div></section>
      `;
    }

    function renderWorksheet() {
      const data = presets[app.preset];
      qs("#worksheetContent").innerHTML = `
        <div class="box"><strong>隨堂練習卷：${data.title}</strong><p class="hint">班級：______ 座號：______ 姓名：____________</p></div>
        ${data.questions.map((q, index) => `
          <article class="question">
            <h3>${index + 1}. ${q[0]}題</h3>
            <p>${mathText(q[1])}</p>
            ${q[2] ? `<div class="options">${q[2].map((o, i) => `<div class="option">(${String.fromCharCode(65+i)}) ${mathText(o)}</div>`).join("")}</div>` : ""}
            <div class="answer-space"></div>
          </article>
        `).join("")}
      `;
    }

    function switchTab(key) {
      qsa(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === key));
      qs("#pageCanvas").classList.toggle("hidden", key !== "canvas");
      qs("#pageLesson").classList.toggle("hidden", key !== "lesson");
      qs("#pageWorksheet").classList.toggle("hidden", key !== "worksheet");
      if (key === "canvas") setTimeout(resizeCanvas, 40);
    }

    function setTool(tool) {
      app.tool = tool;
      qsa("[data-tool]").forEach(btn => btn.classList.toggle("soft", btn.dataset.tool === tool));
      canvas.style.cursor = tool === "select" ? "grab" : "crosshair";
      const names = { select: "選取搬移", point: "新增點", segment: "線段", circle: "圓", arrow: "標示箭頭" };
      toast(`已切換為${names[tool]}`);
    }

    function installAppHandlers() {
      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        app.installPrompt = event;
        qs("#installBtn").hidden = false;
      });
      qs("#installBtn").addEventListener("click", async () => {
        if (!app.installPrompt) return;
        app.installPrompt.prompt();
        await app.installPrompt.userChoice;
        app.installPrompt = null;
        qs("#installBtn").hidden = true;
      });
    }

    function bindEvents() {
      qsa("[data-preset]").forEach(btn => btn.addEventListener("click", () => setPreset(btn.dataset.preset)));
      qsa("[data-style]").forEach(btn => btn.addEventListener("click", () => {
        app.style = btn.dataset.style;
        qsa("[data-style]").forEach(item => item.setAttribute("aria-pressed", item === btn ? "true" : "false"));
        renderGraphic(app.preset);
      }));
      qsa(".tab").forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));
      qsa("[data-tool]").forEach(btn => btn.addEventListener("click", () => setTool(btn.dataset.tool)));
      qs("#generateBtn").addEventListener("click", () => {
        const value = qs("#subject").value;
        const match = Object.entries(presets).find(([, p]) => value.includes(p.title.slice(0, 2)));
        setPreset(match ? match[0] : app.preset);
      });
      qs("#saveTemplateBtn").addEventListener("click", saveCurrentTemplate);
      qs("#loadTemplateBtn").addEventListener("click", loadSelectedTemplate);
      qs("#deleteTemplateBtn").addEventListener("click", deleteSelectedTemplate);
      qs("#customTemplateSelect").addEventListener("change", event => {
        qs("#templateName").value = event.target.value;
      });
      qs("#audience").addEventListener("change", renderLesson);
      qs("#addLabelBtn").addEventListener("click", () => {
        const text = prompt("請輸入新標籤：", "$x^2+y^2=1$");
        if (!text) return;
        app.labels.push({ id: Math.max(0, ...app.labels.map(l => l.id)) + 1, text, px: 42, py: 42 });
        renderLabels();
      });
      qs("#clearBtn").addEventListener("click", () => { app.arrows = []; app.objects = []; app.pendingObject = null; drawArrows(); toast("已清除手繪物件"); });
      qs("#themeBtn").addEventListener("click", () => {
        const themes = ["dark", "light", "indigo"];
        app.labelTheme = themes[(themes.indexOf(app.labelTheme) + 1) % themes.length];
        qs("#themeBtn").textContent = `標籤配色：${app.labelTheme === "dark" ? "深藍" : app.labelTheme === "light" ? "灰白" : "靛藍"}`;
        renderLabels();
        drawArrows();
      });
      qs("#diagramTextBtn").addEventListener("click", () => {
        app.showDiagramText = !app.showDiagramText;
        qs("#diagramTextBtn").textContent = `底圖文字：${app.showDiagramText ? "開" : "關"}`;
        renderGraphic(app.preset);
        toast(app.showDiagramText ? "已顯示底圖內建文字" : "已隱藏底圖干擾文字");
      });
      qs("#copyStateBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(JSON.stringify({ preset: app.preset, labels: app.labels, arrows: app.arrows, objects: app.objects }, null, 2));
        toast("教材 JSON 已複製");
      });
      qs("#printBtn").addEventListener("click", () => window.print());
      qs("#exportPngBtn").addEventListener("click", exportCanvasPng);
      qs("#exportSvgBtn").addEventListener("click", exportCanvasSvg);
      window.addEventListener("resize", resizeCanvas);

      canvas.addEventListener("pointerdown", handleCanvasDown);
      canvas.addEventListener("pointermove", handleCanvasMove);
      canvas.addEventListener("pointerup", handleCanvasUp);
      canvas.addEventListener("pointercancel", () => { app.activeHandle = null; app.pendingObject = null; app.drawing = null; drawArrows(); });
    }

    async function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        try {
          await navigator.serviceWorker.register("./service-worker.js");
        } catch (error) {
          console.warn("Service worker registration failed", error);
        }
      }
    }

    async function exportCanvasPng() {
      const svg = qs("#graphic svg");
      const box = qs("#canvasBox").getBoundingClientRect();
      const scale = 2;
      const output = document.createElement("canvas");
      output.width = Math.round(box.width * scale);
      output.height = Math.round(box.height * scale);
      const out = output.getContext("2d");
      out.scale(scale, scale);
      out.fillStyle = "#ffffff";
      out.fillRect(0, 0, box.width, box.height);

      if (svg) {
        const source = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        const size = fitRect(800, 500, box.width - 36, box.height - 36);
        out.drawImage(img, 18 + size.x, 18 + size.y, size.width, size.height);
        URL.revokeObjectURL(url);
      }

      app.objects.forEach(object => drawObjectTo(out, object, box.width, box.height));
      app.arrows.forEach(arrow => drawArrowTo(out, arrow, box.width, box.height, app.labelTheme === "indigo" ? "#6366f1" : "#dc2626"));
      app.labels.forEach(label => drawLabelTo(out, label, box.width, box.height));

      const link = document.createElement("a");
      link.download = `${presets[app.preset].title}-教材圖.png`;
      link.href = output.toDataURL("image/png");
      link.click();
      toast("PNG 已匯出");
    }

    function exportCanvasSvg() {
      const svg = qs("#graphic svg");
      const box = qs("#canvasBox").getBoundingClientRect();
      const source = svg ? new XMLSerializer().serializeToString(svg) : "";
      const inner = source.replace(/^<svg[^>]*>/, "").replace(/<\/svg>$/, "");
      const overlay = [
        `<g id="editable-objects">${app.objects.map(objectToSvg).join("")}</g>`,
        `<g id="arrows">${app.arrows.map(arrowToSvg).join("")}</g>`,
        `<g id="labels">${app.labels.map(labelToSvg).join("")}</g>`
      ].join("");
      const output = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${Math.round(box.width)}" height="${Math.round(box.height)}" viewBox="0 0 100 100" role="img" aria-label="${escapeHTML(presets[app.preset].title)} 專業數學圖檔">\n  <defs>\n    <marker id="exportArrow" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="#dc2626"/></marker>\n  </defs>\n  <g transform="scale(0.125 0.2)">${inner}</g>\n  ${overlay}\n</svg>`;
      const blob = new Blob([output], { type: "image/svg+xml;charset=utf-8" });
      downloadBlob(blob, `${presets[app.preset].title}-專業數學圖.svg`);
      toast("SVG 已匯出");
    }

    function fitRect(sourceW, sourceH, targetW, targetH) {
      const ratio = Math.min(targetW / sourceW, targetH / sourceH);
      const width = sourceW * ratio;
      const height = sourceH * ratio;
      return { width, height, x: (targetW - width) / 2, y: (targetH - height) / 2 };
    }

    function drawArrowTo(target, arrow, width, height, color) {
      const fromX = arrow.fromX * width / 100;
      const fromY = arrow.fromY * height / 100;
      const toX = arrow.toX * width / 100;
      const toY = arrow.toY * height / 100;
      const angle = Math.atan2(toY - fromY, toX - fromX);
      target.save();
      target.strokeStyle = color;
      target.fillStyle = color;
      target.lineWidth = 3.2;
      target.lineCap = "round";
      target.beginPath();
      target.moveTo(fromX, fromY);
      target.lineTo(toX, toY);
      target.stroke();
      target.beginPath();
      target.moveTo(toX, toY);
      target.lineTo(toX - 14 * Math.cos(angle - Math.PI / 6), toY - 14 * Math.sin(angle - Math.PI / 6));
      target.lineTo(toX - 14 * Math.cos(angle + Math.PI / 6), toY - 14 * Math.sin(angle + Math.PI / 6));
      target.closePath();
      target.fill();
      target.restore();
    }

    function drawObjectTo(target, object, width, height) {
      target.save();
      target.strokeStyle = object.color || "#111827";
      target.fillStyle = object.color || "#111827";
      target.lineWidth = 2.4;
      target.lineCap = "round";
      target.lineJoin = "round";
      if (object.type === "point") {
        const p = pctToPoint(object.x, object.y, width, height);
        drawPointMarker(target, p.x, p.y, object.name || "");
      }
      if (object.type === "segment") {
        const a = pctToPoint(object.x1, object.y1, width, height);
        const b = pctToPoint(object.x2, object.y2, width, height);
        target.beginPath();
        target.moveTo(a.x, a.y);
        target.lineTo(b.x, b.y);
        target.stroke();
      }
      if (object.type === "circle") {
        const c = pctToPoint(object.cx, object.cy, width, height);
        const edge = pctToPoint(object.rx, object.ry, width, height);
        target.beginPath();
        target.arc(c.x, c.y, Math.hypot(edge.x - c.x, edge.y - c.y), 0, Math.PI * 2);
        target.stroke();
      }
      target.restore();
    }

    function drawLabelTo(target, label, width, height) {
      const text = `${label.id}. ${plainMath(label.text)}`;
      const x = label.px * width / 100;
      const y = label.py * height / 100;
      target.save();
      target.font = "700 13px system-ui, sans-serif";
      const metrics = target.measureText(text);
      const pillW = Math.min(Math.max(metrics.width + 24, 72), 340);
      const pillH = 30;
      target.fillStyle = app.labelTheme === "light" ? "rgba(255,255,255,.96)" : app.labelTheme === "indigo" ? "rgba(49,46,129,.96)" : "rgba(15,23,42,.94)";
      target.strokeStyle = app.labelTheme === "light" ? "#cbd5e1" : app.labelTheme === "indigo" ? "#818cf8" : "#334155";
      roundRect(target, x, y, pillW, pillH, 8);
      target.fill();
      target.stroke();
      target.fillStyle = app.labelTheme === "light" ? "#172033" : "#ffffff";
      target.fillText(text, x + 12, y + 20);
      target.restore();
    }

    function roundRect(target, x, y, width, height, radius) {
      target.beginPath();
      target.moveTo(x + radius, y);
      target.arcTo(x + width, y, x + width, y + height, radius);
      target.arcTo(x + width, y + height, x, y + height, radius);
      target.arcTo(x, y + height, x, y, radius);
      target.arcTo(x, y, x + width, y, radius);
      target.closePath();
    }

    function objectToSvg(object) {
      const color = object.color || "#111827";
      if (object.type === "point") {
        return `<circle cx="${object.x}" cy="${object.y}" r="0.9" fill="${color}"/><text x="${object.x + 1.6}" y="${object.y - 1.4}" font-family="Times New Roman, serif" font-size="3" font-weight="700" fill="${color}">${escapeHTML(object.name || "")}</text>`;
      }
      if (object.type === "segment") {
        return `<line x1="${object.x1}" y1="${object.y1}" x2="${object.x2}" y2="${object.y2}" stroke="${color}" stroke-width="0.55" stroke-linecap="round"/>`;
      }
      if (object.type === "circle") {
        const r = Math.hypot(object.rx - object.cx, object.ry - object.cy);
        return `<circle cx="${object.cx}" cy="${object.cy}" r="${r}" fill="none" stroke="${color}" stroke-width="0.55"/>`;
      }
      return "";
    }

    function arrowToSvg(arrow) {
      return `<line x1="${arrow.fromX}" y1="${arrow.fromY}" x2="${arrow.toX}" y2="${arrow.toY}" stroke="#dc2626" stroke-width="0.7" stroke-linecap="round" marker-end="url(#exportArrow)"/>`;
    }

    function labelToSvg(label) {
      const text = escapeHTML(plainMath(label.text));
      const width = Math.min(Math.max(text.length * 1.8 + 7, 14), 46);
      const fill = app.labelTheme === "light" ? "#ffffff" : app.labelTheme === "indigo" ? "#312e81" : "#0f172a";
      const stroke = app.labelTheme === "light" ? "#cbd5e1" : app.labelTheme === "indigo" ? "#818cf8" : "#334155";
      const color = app.labelTheme === "light" ? "#172033" : "#ffffff";
      return `<g><rect x="${label.px}" y="${label.py}" width="${width}" height="5.8" rx="1.4" fill="${fill}" stroke="${stroke}" stroke-width="0.25"/><text x="${label.px + 1.8}" y="${label.py + 3.9}" fill="${color}" font-family="Noto Sans TC, system-ui, sans-serif" font-size="2.8" font-weight="700">${label.id}. ${text}</text></g>`;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = filename;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }

    bindEvents();
    installAppHandlers();
    loadCustomTemplates();
    setPreset("pythagoras");
    resizeCanvas();
    registerServiceWorker();
  </script>
</body>
</html>
